  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"8f6b2dc7-d645-4403-8233-223d6bd5a1ac\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n  <style>\n    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\n\n    body {\n      background: #080810;\n      color: #c8c6e0;\n      min-height: 100vh;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      font-family: 'IBM Plex Mono', monospace;\n      padding: 40px 24px;\n    }\n\n    .page {\n      width: 100%;\n      max-width: 1080px;\n      display: flex;\n      flex-direction: column;\n      align-items: center;\n    }\n\n    /* ── Header ── */\n    .page-label {\n      font-size: 10px;\n      letter-spacing: 0.2em;\n      color: #2a2938;\n      text-transform: uppercase;\n      margin-bottom: 16px;\n    }\n\n    .page-heading {\n      font-family: 'DM Serif Display', serif;\n      font-style: italic;\n      font-weight: 400;\n      font-size: 36px;\n      color: #eceaf8;\n      letter-spacing: -0.02em;\n      line-height: 1.1;\n      text-align: center;\n      margin-bottom: 12px;\n    }\n\n    .page-sub {\n      font-size: 11px;\n      color: #28273a;\n      line-height: 1.75;\n      text-align: center;\n      margin-bottom: 48px;\n    }\n\n    /* ── Cards ── */\n    .cards {\n      display: flex;\n      gap: 12px;\n      width: 100%;\n      align-items: stretch;\n    }\n\n    .card {\n      flex: 1;\n      display: flex;\n      flex-direction: column;\n      background: #0c0c14;\n      border: 1px solid #1a1a28;\n      border-radius: 8px;\n      overflow: hidden;\n      transition: border-color 0.2s;\n    }\n\n\n\n    .card:hover {\n      border-color: #242438;\n    }\n\n    /* Top accent */\n    .card-accent {\n      height: 2px;\n      flex-shrink: 0;\n    }\n\n    /* Body */\n    .card-body {\n      padding: 22px 20px 0;\n      display: flex;\n      flex-direction: column;\n      flex: 1;\n    }\n\n    .tier-name {\n      font-size: 14px;\n      font-weight: 500;\n      color: #c0bedd;\n      letter-spacing: 0em;\n      margin-bottom: 6px;\n    }\n\n    .tier-desc {\n      font-size: 11px;\n      color: #424158;\n      line-height: 1.55;\n    }\n\n    .divider {\n      height: 1px;\n      background: #161622;\n      margin: 16px 0 13px;\n      flex-shrink: 0;\n    }\n\n    .includes-tag {\n      font-size: 10px;\n      letter-spacing: 0.04em;\n      margin-bottom: 10px;\n      flex-shrink: 0;\n    }\n\n    /* Features */\n    .features {\n      list-style: none;\n      display: flex;\n      flex-direction: column;\n      gap: 8px;\n      flex: 1;\n    }\n\n    .feature {\n      display: flex;\n      gap: 9px;\n      align-items: flex-start;\n    }\n\n    .feature-dot {\n      width: 3px;\n      height: 3px;\n      border-radius: 50%;\n      margin-top: 6px;\n      flex-shrink: 0;\n      opacity: 0.5;\n    }\n\n    .feature-text {\n      font-size: 11px;\n      color: #88879e;\n      line-height: 1.65;\n    }\n\n    /* Collapse */\n    .feature.extra { display: none; }\n    .card.expanded .feature.extra { display: flex; }\n\n    .expand-btn {\n      background: none;\n      border: none;\n      cursor: pointer;\n      font-family: 'IBM Plex Mono', monospace;\n      font-size: 10px;\n      text-align: left;\n      padding: 9px 0 0;\n      letter-spacing: 0.03em;\n      opacity: 0.45;\n      transition: opacity 0.15s;\n      flex-shrink: 0;\n    }\n\n    .expand-btn:hover { opacity: 0.75; }\n    .card.expanded .expand-btn { display: none; }\n\n    .learn-link {\n      font-size: 10px;\n      color: #282736;\n      text-decoration: underline;\n      text-underline-offset: 3px;\n      cursor: pointer;\n      padding-top: 5px;\n      flex-shrink: 0;\n      transition: color 0.15s;\n    }\n\n    .learn-link:hover { color: #3a3952; }\n\n    /* Footer */\n    .card-footer {\n      padding: 14px 20px 20px;\n      border-top: 1px solid #161622;\n      margin-top: 16px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      flex-shrink: 0;\n    }\n\n    .price {\n      font-size: 11px;\n      color: #2e2d44;\n      letter-spacing: 0.01em;\n    }\n\n    .cta-btn {\n      font-family: 'IBM Plex Mono', monospace;\n      font-size: 11px;\n      border-radius: 6px;\n      padding: 8px 15px;\n      cursor: pointer;\n      letter-spacing: 0.03em;\n      transition: opacity 0.15s;\n    }\n\n    .cta-btn:hover { opacity: 0.8; }\n\n    /* Page footer */\n    .page-footer {\n      margin-top: 28px;\n      font-size: 10px;\n      color: #1e1d2c;\n      text-align: center;\n      line-height: 1.6;\n    }\n  <\u002Fstyle>\n  \n<\u002Fhead>\n<body>\n  <div class=\"page\">\n\n    <div class=\"page-label\">Memory Setup<\u002Fdiv>\n    <h1 class=\"page-heading\">Choose how you want me to remember.<\u002Fh1>\n    <p class=\"page-sub\">\n      Memory starts from the moment you opt in — nothing from before is backfilled.<br>\n      You can change tiers at any time in Settings.\n    <\u002Fp>\n\n    <div class=\"cards\">\n\n      <!-- Basic -->\n      <div class=\"card\">\n        <div class=\"card-accent\" style=\"background: #2dd4bf;\"><\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"tier-name\">Basic<\u002Fdiv>\n          <div class=\"tier-desc\">A gentle, low-cost memory that records the facts without interpretation.<\u002Fdiv>\n          <div class=\"divider\"><\u002Fdiv>\n          <ul class=\"features\">\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #2dd4bf;\"><\u002Fdiv>\n              <span class=\"feature-text\">Remembers things you explicitly tell me — jobs, preferences, projects, tools.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #2dd4bf;\"><\u002Fdiv>\n              <span class=\"feature-text\">Keeps track of your timeline so I always know where you are now.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #2dd4bf;\"><\u002Fdiv>\n              <span class=\"feature-text\">Surfaces gentle reminders when facts get old or might have changed.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #2dd4bf;\"><\u002Fdiv>\n              <span class=\"feature-text\">No speculation, no inference. Just a clean, searchable record.<\u002Fspan>\n            <\u002Fli>\n          <\u002Ful>\n          <button class=\"expand-btn\" style=\"color: #2dd4bf;\">+ 2 more features<\u002Fbutton>\n          <div class=\"learn-link\">Learn exactly what's stored<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card-footer\">\n          <span class=\"price\">~$0.50/mo<\u002Fspan>\n          <button class=\"cta-btn\" style=\"background: rgba(45,212,191,0.1); border: 1px solid rgba(45,212,191,0.32); color: #2dd4bf;\">Enable Basic<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Reflective -->\n      <div class=\"card\">\n        <div class=\"card-accent\" style=\"background: #60a5fa;\"><\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"tier-name\">Reflective<\u002Fdiv>\n          <div class=\"tier-desc\">A thoughtful memory that resolves contradictions and learns from its mistakes.<\u002Fdiv>\n          <div class=\"divider\"><\u002Fdiv>\n          <div class=\"includes-tag\" style=\"color: rgba(96,165,250,0.5);\">Everything in Basic, plus:<\u002Fdiv>\n          <ul class=\"features\">\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #60a5fa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Detects when new facts conflict with old ones and asks you to clarify — building a truthful timeline.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #60a5fa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Maintains a Review area where you can see and resolve open questions about your memories.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #60a5fa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Learns how reliable different types of information are from you and gets better over time.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #60a5fa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Remembers promises you've asked me to keep (reminders, follow-ups).<\u002Fspan>\n            <\u002Fli>\n          <\u002Ful>\n          <button class=\"expand-btn\" style=\"color: #60a5fa;\">+ 2 more features<\u002Fbutton>\n          <div class=\"learn-link\">Learn exactly what's stored<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card-footer\">\n          <span class=\"price\">~$1–2/mo<\u002Fspan>\n          <button class=\"cta-btn\" style=\"background: rgba(96,165,250,0.1); border: 1px solid rgba(96,165,250,0.32); color: #60a5fa;\">Enable Reflective<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Prescient -->\n      <div class=\"card\">\n        <div class=\"card-accent\" style=\"background: #a78bfa;\"><\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"tier-name\">Prescient<\u002Fdiv>\n          <div class=\"tier-desc\">A memory that connects the dots, anticipates what you'll need, and tells your story.<\u002Fdiv>\n          <div class=\"divider\"><\u002Fdiv>\n          <div class=\"includes-tag\" style=\"color: rgba(167,139,250,0.5);\">Everything in Reflective, plus:<\u002Fdiv>\n          <ul class=\"features\">\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #a78bfa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Builds a multi-strand timeline of your life and lets you time-travel through past versions of your knowledge.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature\">\n              <div class=\"feature-dot\" style=\"background: #a78bfa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Tracks your goals and ambitions, notices when they're quietly fading, and helps you reflect on them.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #a78bfa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Forms silent hypotheses about your preferences and future direction — shows them to you to confirm or reject.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #a78bfa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Can write a living biography of your life, organized into chapters, that you can edit and lock.<\u002Fspan>\n            <\u002Fli>\n            <li class=\"feature extra\">\n              <div class=\"feature-dot\" style=\"background: #a78bfa;\"><\u002Fdiv>\n              <span class=\"feature-text\">Pre-warms relevant memories when you start a session, so answers feel instantaneous.<\u002Fspan>\n            <\u002Fli>\n          <\u002Ful>\n          <button class=\"expand-btn\" style=\"color: #a78bfa;\">+ 3 more features<\u002Fbutton>\n          <div class=\"learn-link\">Learn exactly what's stored<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card-footer\">\n          <span class=\"price\">~$3+/mo<\u002Fspan>\n          <button class=\"cta-btn\" style=\"background: rgba(167,139,250,0.1); border: 1px solid rgba(167,139,250,0.32); color: #a78bfa;\">Enable Prescient<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n\n    <p class=\"page-footer\">\n      Upgrading later adds new processing immediately. Downgrading stops future additions without deleting existing memories.\n    <\u002Fp>\n\n  <\u002Fdiv>\n\n  <script>\n    // Expand\n    document.querySelectorAll('.expand-btn').forEach(btn => {\n      btn.addEventListener('click', () => btn.closest('.card').classList.add('expanded'));\n    });\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
